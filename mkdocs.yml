#Project Information
site_name: Actian Data Observability
site_url: https://docs.actian.com/actian-data-observability/
site_description: >-
  Documentation for Actian Data Observability — proactively understand, detect, and resolve data quality issues.
use_directory_urls: false
docs_dir: docs
site_dir: site

# Navigation
#
# The navigation is generated automatically by the awesome-pages plugin (see the
# `plugins` section below) from the docs/ directory structure plus the `.pages`
# files in each folder. Add a new .md file and it appears in the nav without
# touching this file: the per-folder `.pages` files set the order/titles and end
# with a `...` catch-all so new pages are picked up automatically. Folders that
# should stay out of the nav use a `.pages` file with `hide: true`.

# Theme Configuration
theme:
  name: material
  logo: assets/images/actian-logo.svg
  favicon: assets/favicon.png
  language: en
  custom_dir: theme_overrides/
  icon:
    repo: material/lifebuoy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.indexes
    - navigation.path
    - navigation.footer
    - navigation.sections
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.share
    - search.suggest

# Markdown Extensions
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - meta
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      title: On this page
      permalink: true

# Copyright
copyright: >-
  Copyright &copy; 2026, Actian

extra:
  generator: false
  homepage: https://docs.actian.com/
  social:
    - icon: fontawesome/solid/paper-plane
      link: https://www.actian.com/contact/
      name: Contact Actian Support
  tags:
    default: default
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback!

# Support
repo_url: https://www.actian.com/contact/
repo_name: Support

plugins:
  - search
  - awesome-pages
  - tags
  - glightbox
  - git-revision-date-localized:
      type: date
      enable_creation_date: false
      fallback_to_build_date: true
  - meta-descriptions

# Customization
extra_css:
  - assets/stylesheets/style.css
  - stylesheets/dx_style.css
  - assets/stylesheets/actian-landing.css
  - stylesheets/extra.css
  - stylesheets/toast-override.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/marked/marked.min.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
  - javascripts/search_enhancement.js
  - javascripts/extra.js
  - path: javascripts/current.js
    defer: true
  - javascripts/toast-fix.js

hooks:
  - hooks/section_index.py
  - hooks/custom_lexers.py
